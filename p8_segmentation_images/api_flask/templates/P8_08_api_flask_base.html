<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Segmentation</title>
</head>
<body>

    <br/>
    <br/>
    <h1>Segmentation d'une image</h1>
    <br/>
    <br/>

    <figure>
      <img src="{{ img_source }}" alt="" />
      <figcaption> image source</figcaption>
    </figure>
    <figure>
      <img src="{{ img_seg }}" alt="" />
      <figcaption> image segmentée</figcaption>
    </figure>
    <figure>
      <img src="data:image/png;base64,{{ img_pred }}" alt="img_pred"  id="imgslot"/>
      <figcaption> image segmentée par modèle</figcaption>
    </figure>

  <style type="text/css">
    *
    {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    figure
    {
      display: inline-block;

    }

    figcaption
    {
      text-align: center;
    }
     
    img
    {
      width: 400px;
      /*width: calc(100% / 3);*/
      margin-left: 10px;
      margin-right: 10px;
      display: inline-block;

    }
     
  </style>

</body>
</html>
